<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>냉털 밀프렙 - 자취 초보를 위한 레시피</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .fade-in {
            animation: fadeIn 0.7s ease-out forwards;
        }
        .slide-in-from-bottom-8 {
            animation: slideInFromBottom 0.7s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInFromBottom {
            from { transform: translateY(2rem); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans selection:bg-emerald-200 selection:text-emerald-900 pb-20">

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
        
        <!-- 앱 타이틀 및 히어로 섹션 -->
        <div class="bg-emerald-600 rounded-[2rem] p-8 sm:p-10 text-white shadow-lg relative overflow-hidden mb-10">
            <div class="absolute -top-10 -right-10 p-8 opacity-10">
                <i data-lucide="chef-hat" style="width: 200px; height: 200px;"></i>
            </div>
            <div class="relative z-10">
                <div class="flex items-center gap-4 mb-6">
                    <div class="bg-white text-emerald-600 p-3 rounded-2xl shadow-md">
                        <i data-lucide="chef-hat" style="width: 36px; height: 36px; stroke-width: 2.5px;"></i>
                    </div>
                    <h1 class="text-4xl sm:text-5xl font-black tracking-tight drop-shadow-sm">냉털</h1>
                </div>
                <!-- 수정된 부분: 볼드체 제목 -->
                <h2 class="text-2xl sm:text-3xl font-bold mb-3 text-white">
                    자취 초보를 위한 냉장고 털이 레시피
                </h2>
                <!-- 수정된 부분: 하단 설명 문구 -->
                <p class="text-emerald-50 text-base sm:text-lg max-w-xl leading-relaxed">
                    가지고 계신 재료와 도구를 입력하시면, 자취 초보들도 만들 수 있는 간편한 밀프렙 레시피를 설계해드립니다.
                </p>
            </div>
        </div>

        <!-- 폼 컨테이너 -->
        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden mb-8">
            <div class="p-6 sm:p-10 space-y-10">

                <!-- 0. 목표 끼니 수 -->
                <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-slate-50 p-6 rounded-2xl border border-slate-100 gap-4">
                    <div>
                        <label class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="layers" class="text-indigo-500 w-[22px] h-[22px]"></i>
                            목표 밀프렙 분량
                        </label>
                        <p class="text-sm text-slate-500 mt-1">한 번에 만들어둘 끼니 수를 설정해주세요.</p>
                    </div>
                    <div class="flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-200 shadow-sm w-fit">
                        <button onclick="handleDecrement()" class="w-10 h-10 flex items-center justify-center rounded-lg bg-slate-50 text-slate-600 hover:bg-slate-100 transition-colors border border-slate-200 active:bg-slate-200">
                            <i data-lucide="minus" class="w-[18px] h-[18px]"></i>
                        </button>
                        <div class="w-16 text-center">
                            <span id="portions-display" class="text-2xl font-black text-slate-800">1</span>
                            <span class="text-sm font-bold text-slate-500 ml-1">끼</span>
                        </div>
                        <button onclick="handleIncrement()" class="w-10 h-10 flex items-center justify-center rounded-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-100 transition-colors border border-indigo-200 active:bg-indigo-200">
                            <i data-lucide="plus" class="w-[18px] h-[18px]"></i>
                        </button>
                    </div>
                </div>
                
                <!-- 1. 도구 및 양념 선택 -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
                    <div class="space-y-4">
                        <label class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="wrench" class="text-blue-500 w-[22px] h-[22px]"></i>
                            사용 가능한 조리도구 <span class="text-sm font-normal text-slate-400 ml-1">(다중 선택)</span>
                        </label>
                        <div id="tools-container" class="flex flex-wrap gap-2.5">
                            <!-- JS로 렌더링됨 -->
                        </div>
                        <div class="flex items-center gap-2 mt-3">
                            <input type="text" id="custom-tool-input" onkeypress="if(event.key === 'Enter') { event.preventDefault(); addCustomTool(); }" class="flex-1 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 transition-colors text-slate-700 placeholder-slate-400 text-sm shadow-sm outline-none" placeholder="기타 도구 직접 입력 (엔터)">
                            <button type="button" onclick="addCustomTool()" class="px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-sm font-bold transition-all shadow-sm flex items-center gap-1">
                                <i data-lucide="plus" class="w-[16px] h-[16px]"></i> 추가
                            </button>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <label class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="droplets" class="text-orange-500 w-[22px] h-[22px]"></i>
                            현재 보유한 양념·조미료 <span class="text-sm font-normal text-slate-400 ml-1">(다중 선택)</span>
                        </label>
                        <div id="seasonings-container" class="flex flex-wrap gap-2.5">
                            <!-- JS로 렌더링됨 -->
                        </div>
                        <div class="flex items-center gap-2 mt-3">
                            <input type="text" id="custom-seasoning-input" onkeypress="if(event.key === 'Enter') { event.preventDefault(); addCustomSeasoning(); }" class="flex-1 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 transition-colors text-slate-700 placeholder-slate-400 text-sm shadow-sm outline-none" placeholder="기타 양념 직접 입력 (엔터)">
                            <button type="button" onclick="addCustomSeasoning()" class="px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-sm font-bold transition-all shadow-sm flex items-center gap-1">
                                <i data-lucide="plus" class="w-[16px] h-[16px]"></i> 추가
                            </button>
                        </div>
                    </div>
                </div>

                <div class="w-full h-px bg-slate-100"></div>

                <!-- 2. 자투리 식재료 -->
                <div class="space-y-4">
                    <label for="ingredients" class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="apple" class="text-emerald-500 w-[22px] h-[22px]"></i>
                        자투리 식재료 입력 <span class="text-rose-500">*</span>
                    </label>
                    <textarea id="ingredients" rows="3" class="w-full px-5 py-4 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors text-slate-700 placeholder-slate-400 resize-none text-base shadow-sm outline-none" placeholder="예: 먹다 남은 닭가슴살 2조각, 시들해진 양배추 1/4통, 밥 2공기..."></textarea>
                </div>

                <!-- 3. 추가 요구사항 -->
                <div class="space-y-4">
                    <label for="requirements" class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="sparkles" class="text-amber-500 w-[22px] h-[22px]"></i>
                        추가 요구사항 <span class="text-sm font-normal text-slate-400 ml-1">(선택)</span>
                    </label>
                    <input type="text" id="requirements" class="w-full px-5 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors text-slate-700 placeholder-slate-400 text-base shadow-sm outline-none" placeholder="예: 다이어트용 저칼로리로 해줘, 상하기 쉬운 재료 먼저 사용...">
                </div>
                
                <!-- 에러 메시지 -->
                <div id="error-container" class="hidden flex items-center gap-2 text-rose-600 bg-rose-50 p-4 rounded-xl text-base font-medium border border-rose-100">
                    <i data-lucide="alert-circle" class="flex-shrink-0 w-[20px] h-[20px]"></i>
                    <p id="error-message"></p>
                </div>

                <!-- 액션 버튼 -->
                <div class="pt-2">
                    <button id="submit-btn" onclick="generateRecipe()" class="w-full flex items-center justify-center gap-3 bg-slate-900 hover:bg-slate-800 text-white font-bold text-lg py-5 px-8 rounded-2xl transition-all duration-200 shadow-lg hover:shadow-xl active:scale-[0.98]">
                        <i id="btn-icon" data-lucide="utensils-crossed" class="w-[24px] h-[24px]"></i>
                        <span id="btn-text">완벽한 밀프렙 식단 생성하기</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 결과 UI 렌더링 섹션 -->
        <div id="result-container" class="hidden fade-in slide-in-from-bottom-8 space-y-6">
            <!-- JS로 렌더링됨 -->
        </div>

    </main>

    <script>
        lucide.createIcons();

        let portions = 1;
        let selectedTools = [];
        let selectedSeasonings = [];
        let loading = false;

        const TOOLS_LIST = ['전자레인지', '에어프라이어', '가스레인지/인덕션', '프라이팬', '냄비', '도마/칼', '믹서기', '전기밥솥'];
        const SEASONINGS_LIST = ['소금', '후추', '간장', '고추장', '된장', '설탕', '올리고당', '참기름', '식용유', '케첩', '마요네즈', '굴소스', '다진마늘', '고춧가루', '식초'];

        const apiKey = "";

        function renderTools() {
            const container = document.getElementById('tools-container');
            container.innerHTML = TOOLS_LIST.map(tool => {
                const isSelected = selectedTools.includes(tool);
                const baseClasses = "px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 border";
                const selectedClasses = "bg-blue-600 text-white border-blue-600 shadow-md scale-[1.02]";
                const unselectedClasses = "bg-white text-slate-600 border-slate-200 hover:border-blue-300 hover:bg-blue-50";
                
                return `
                    <button type="button" onclick="toggleTool('${tool}')" class="${baseClasses} ${isSelected ? selectedClasses : unselectedClasses}">
                        ${tool}
                    </button>
                `;
            }).join('');
        }

        function renderSeasonings() {
            const container = document.getElementById('seasonings-container');
            container.innerHTML = SEASONINGS_LIST.map(seasoning => {
                const isSelected = selectedSeasonings.includes(seasoning);
                const baseClasses = "px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 border";
                const selectedClasses = "bg-orange-500 text-white border-orange-500 shadow-md scale-[1.02]";
                const unselectedClasses = "bg-white text-slate-600 border-slate-200 hover:border-orange-300 hover:bg-orange-50";
                
                return `
                    <button type="button" onclick="toggleSeasoning('${seasoning}')" class="${baseClasses} ${isSelected ? selectedClasses : unselectedClasses}">
                        ${seasoning}
                    </button>
                `;
            }).join('');
        }

        function handleIncrement() {
            portions++;
            document.getElementById('portions-display').textContent = portions;
        }

        function handleDecrement() {
            if (portions > 1) {
                portions--;
                document.getElementById('portions-display').textContent = portions;
            }
        }

        function toggleTool(tool) {
            if (selectedTools.includes(tool)) {
                selectedTools = selectedTools.filter(t => t !== tool);
            } else {
                selectedTools.push(tool);
            }
            renderTools();
        }

        function toggleSeasoning(seasoning) {
            if (selectedSeasonings.includes(seasoning)) {
                selectedSeasonings = selectedSeasonings.filter(s => s !== seasoning);
            } else {
                selectedSeasonings.push(seasoning);
            }
            renderSeasonings();
        }

        function addCustomTool() {
            const input = document.getElementById('custom-tool-input');
            const val = input.value.trim();
            if (val) {
                if (!TOOLS_LIST.includes(val)) TOOLS_LIST.push(val);
                if (!selectedTools.includes(val)) selectedTools.push(val);
                input.value = '';
                renderTools();
            }
        }

        function addCustomSeasoning() {
            const input = document.getElementById('custom-seasoning-input');
            const val = input.value.trim();
            if (val) {
                if (!SEASONINGS_LIST.includes(val)) SEASONINGS_LIST.push(val);
                if (!selectedSeasonings.includes(val)) selectedSeasonings.push(val);
                input.value = '';
                renderSeasonings();
            }
        }

        function showError(message) {
            const container = document.getElementById('error-container');
            const msgEl = document.getElementById('error-message');
            msgEl.textContent = message;
            container.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error-container').classList.add('hidden');
        }

        function setLoading(isLoading) {
            loading = isLoading;
            const btn = document.getElementById('submit-btn');
            const icon = document.getElementById('btn-icon');
            const text = document.getElementById('btn-text');

            if (isLoading) {
                btn.disabled = true;
                btn.classList.add('opacity-70', 'cursor-not-allowed');
                icon.setAttribute('data-lucide', 'loader-2');
                icon.classList.add('animate-spin');
                text.textContent = '재료 분석 및 식단 설계 중...';
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                icon.setAttribute('data-lucide', 'utensils-crossed');
                icon.classList.remove('animate-spin');
                text.textContent = '완벽한 밀프렙 식단 생성하기';
            }
            lucide.createIcons();
        }

        async function fetchWithRetry(url, options, retries = 5, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        async function generateRecipe() {
            const ingredients = document.getElementById('ingredients').value;
            const requirements = document.getElementById('requirements').value;

            if (!ingredients.trim()) {
                showError('냉장고에 있는 식재료를 조금이라도 알려주세요!');
                return;
            }

            hideError();
            setLoading(true);
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('result-container').innerHTML = '';

            const systemPrompt = `당신은 1인 가구 자취생들의 구세주이자, '냉장고 파먹기'와 '밀프렙(Meal Prep)'의 달인인 셰프입니다.
가장 중요한 규칙: 절대 존재하지 않는 새로운 퓨전 요리를 창작하지 마세요. 반드시 사용자의 재료로 만들 수 있는 **실제로 존재하고 이름이 널리 알려진 대중적인 요리**를 하나 선정하여 밀프렙으로 제안해야 합니다.

응답은 반드시 아래의 JSON 형식으로만 작성해야 하며, 추가 설명 없이 순수 JSON 텍스트만 출력하세요.

{
  "recipeName": "실존하는 대중적인 요리 이름",
  "description": "이 요리가 왜 밀프렙에 좋은지 짧은 설명",
  "prepTime": "예: 10분",
  "cookTime": "예: 20분",
  "difficulty": "쉬움, 보통, 어려움 중 택 1",
  "nutrition": {
    "calories": "1끼 기준 칼로리",
    "carbs": "1끼 기준 탄수화물",
    "protein": "1끼 기준 단백질",
    "fat": "1끼 기준 지방"
  },
  "planB": {
    "ingredients": ["대체 재료 안내"],
    "tools": ["대체 도구 안내"],
    "seasonings": ["대체 양념 안내"]
  },
  "ingredients": [
    { "name": "재료명", "amount": "분량" }
  ],
  "seasonings": [
    { "name": "양념명", "amount": "분량" }
  ],
  "steps": [
    "단계별 조리법"
  ],
  "mealPrepGuide": {
    "storage": "보관법",
    "period": "보관기한",
    "reheat": "재가열법"
  },
  "chefTip": "셰프의 팁"
}`;

            const userQuery = `[냉장고 식재료]: ${ingredients}\n[보유 조리도구]: ${selectedTools.length > 0 ? selectedTools.join(', ') : '칼, 도마'}\n[보유 양념]: ${selectedSeasonings.length > 0 ? selectedSeasonings.join(', ') : '없음'}\n[목표 끼니 수]: ${portions}끼 분량\n[추가 요구사항]: ${requirements || '없음'}`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: userQuery }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { responseMimeType: "application/json" }
                };

                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (result.candidates && result.candidates[0].content && result.candidates[0].content.parts[0].text) {
                    const jsonText = result.candidates[0].content.parts[0].text;
                    const parsedData = JSON.parse(jsonText.replace(/```json/gi, '').replace(/```/g, '').trim());
                    renderResult(parsedData);
                } else {
                    throw new Error('레시피 데이터를 불러오는 중 문제가 발생했습니다.');
                }
            } catch (err) {
                console.error(err);
                showError('밀프렙 레시피를 구성하는 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
            } finally {
                setLoading(false);
            }
        }

        function renderResult(data) {
            const container = document.getElementById('result-container');
            
            let html = `
                <div class="bg-emerald-600 rounded-[2rem] p-8 sm:p-10 text-white shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-8 opacity-10">
                        <i data-lucide="chef-hat" style="width: 150px; height: 150px;"></i>
                    </div>
                    <div class="relative z-10">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="bg-white/20 px-3 py-1 rounded-full text-sm font-bold backdrop-blur-sm">
                                ${portions}끼 분량 맞춤
                            </span>
                            <span class="bg-emerald-800/50 px-3 py-1 rounded-full text-sm font-bold backdrop-blur-sm">
                                ${data.difficulty}
                            </span>
                        </div>
                        <h2 class="text-3xl sm:text-4xl font-black mb-3">${data.recipeName}</h2>
                        <p class="text-emerald-100 text-lg max-w-xl leading-relaxed">${data.description}</p>
                        
                        <div class="flex flex-wrap gap-6 mt-8 pt-6 border-t border-emerald-500/50">
                            <div class="flex items-center gap-2">
                                <i data-lucide="clock" class="text-emerald-200 w-[20px] h-[20px]"></i>
                                <span class="font-medium">준비 ${data.prepTime}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <i data-lucide="flame" class="text-emerald-200 w-[20px] h-[20px]"></i>
                                <span class="font-medium">조리 ${data.cookTime}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] p-6 sm:p-8 shadow-sm border border-slate-200">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="sparkles" class="text-amber-500 w-[24px] h-[24px]"></i>
                            영양 성분 <span class="text-sm font-normal text-slate-400 ml-1">(1끼 기준)</span>
                        </h3>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-col items-center justify-center text-center">
                            <span class="text-slate-500 text-sm font-bold mb-1">칼로리</span>
                            <span class="text-2xl font-black text-slate-800">${data.nutrition.calories}</span>
                        </div>
                        <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 flex flex-col items-center justify-center text-center">
                            <span class="text-emerald-600 text-sm font-bold mb-1">탄수화물</span>
                            <span class="text-2xl font-black text-emerald-900">${data.nutrition.carbs}</span>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex flex-col items-center justify-center text-center">
                            <span class="text-blue-600 text-sm font-bold mb-1">단백질</span>
                            <span class="text-2xl font-black text-blue-900">${data.nutrition.protein}</span>
                        </div>
                        <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100 flex flex-col items-center justify-center text-center">
                            <span class="text-orange-600 text-sm font-bold mb-1">지방</span>
                            <span class="text-2xl font-black text-orange-900">${data.nutrition.fat}</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-1 space-y-6">
                        <div class="bg-white rounded-[2rem] p-6 sm:p-8 shadow-sm border border-slate-200">
                            <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                <i data-lucide="apple" class="text-emerald-500 w-[24px] h-[24px]"></i>
                                필요한 재료
                            </h3>
                            <ul class="space-y-4">
                                ${data.ingredients.map(ing => `
                                    <li class="flex justify-between items-center pb-3 border-b border-slate-100 last:border-0 last:pb-0">
                                        <span class="font-semibold text-slate-700">${ing.name}</span>
                                        <span class="text-slate-500 text-sm">${ing.amount}</span>
                                    </li>
                                `).join('')}
                            </ul>
                            ${data.seasonings ? `
                                <h3 class="text-xl font-bold text-slate-800 mt-8 mb-6 flex items-center gap-2">
                                    <i data-lucide="droplets" class="text-orange-500 w-[24px] h-[24px]"></i>
                                    양념
                                </h3>
                                <ul class="space-y-4">
                                    ${data.seasonings.map(sea => `
                                        <li class="flex justify-between items-center pb-3 border-b border-slate-100 last:border-0 last:pb-0">
                                            <span class="font-semibold text-slate-700">${sea.name}</span>
                                            <span class="text-slate-500 text-sm">${sea.amount}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            ` : ''}
                        </div>
                    </div>

                    <div class="md:col-span-2 space-y-6">
                        <div class="bg-white rounded-[2rem] p-6 sm:p-8 shadow-sm border border-slate-200 h-full">
                            <h3 class="text-xl font-bold text-slate-800 mb-8 flex items-center gap-2">
                                <i data-lucide="utensils-crossed" class="text-slate-500 w-[24px] h-[24px]"></i>
                                조리 순서
                            </h3>
                            <div class="space-y-6">
                                ${data.steps.map((step, idx) => `
                                    <div class="flex gap-4">
                                        <div class="flex-shrink-0 w-8 h-8 bg-slate-100 text-slate-600 rounded-full flex items-center justify-center font-bold text-sm">
                                            ${idx + 1}
                                        </div>
                                        <p class="text-slate-700 pt-1 leading-relaxed">${step}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-amber-50 rounded-[2rem] p-6 sm:p-8 border border-amber-100 shadow-sm relative overflow-hidden">
                    <h3 class="text-xl font-bold text-amber-900 mb-6 flex items-center gap-2">
                        <i data-lucide="lightbulb" class="text-amber-500 w-[24px] h-[24px]"></i>
                        혹시 부족한가요? (Plan B)
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                        <div class="bg-white p-5 rounded-2xl shadow-sm">
                            <div class="flex items-center gap-2 mb-3 text-amber-800 font-bold">식재료 대체</div>
                            <ul class="space-y-2 text-sm text-slate-600">
                                ${data.planB.ingredients.map(item => `<li>• ${item}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm">
                            <div class="flex items-center gap-2 mb-3 text-amber-800 font-bold">도구 대체</div>
                            <ul class="space-y-2 text-sm text-slate-600">
                                ${data.planB.tools.map(item => `<li>• ${item}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm">
                            <div class="flex items-center gap-2 mb-3 text-amber-800 font-bold">양념 대체</div>
                            <ul class="space-y-2 text-sm text-slate-600">
                                ${data.planB.seasonings.map(item => `<li>• ${item}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="bg-indigo-50 rounded-[2rem] p-6 sm:p-8 border border-indigo-100 shadow-sm">
                    <h3 class="text-xl font-bold text-indigo-900 mb-6 flex items-center gap-2">
                        <i data-lucide="archive" class="text-indigo-500 w-[24px] h-[24px]"></i>
                        밀프렙 보관 및 재가열 가이드
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 text-sm">
                        <div class="bg-white p-5 rounded-2xl">
                            <div class="font-bold text-indigo-800 mb-2">소분 및 보관</div>
                            <p>${data.mealPrepGuide.storage}</p>
                        </div>
                        <div class="bg-white p-5 rounded-2xl">
                            <div class="font-bold text-indigo-800 mb-2">보관 기한</div>
                            <p>${data.mealPrepGuide.period}</p>
                        </div>
                        <div class="bg-white p-5 rounded-2xl">
                            <div class="font-bold text-indigo-800 mb-2">재가열 방법</div>
                            <p>${data.mealPrepGuide.reheat}</p>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = html;
            container.classList.remove('hidden');
            lucide.createIcons();
        }

        renderTools();
        renderSeasonings();
    </script>
</body>
</html>
